name: C Build Release

on:
  push:
    tags:
      - 'v*' # This triggers the workflow for any tag starting with 'v'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile Hello World
        run: gcc -o hello_executable main.c

      - name: Save executable as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: hello_executable