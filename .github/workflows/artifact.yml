name: Artifact Releases

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile Hello World
        run: gcc -o hello_executable main.c

      - name: Run Post-Build Scripts
        run: |
          # 1. Ensure post.sh is executable
          chmod +x ./post.sh
          # 2. Run post.sh (This MUST create the 'releases' folder)
          ./post.sh

      # - name: Execute Python Indexing
      #   run: |
      #     # We do NOT pass arguments because your script uses a hardcoded BASE_DIR
      #     # We check if the folder exists first to avoid script errors
      #     if [ -d "releases" ]; then
      #       python3 index.py
      #     else
      #       echo "::error::The 'releases' directory was not created by post.sh!"
      #       exit 1
      #     fi

      # - name: Save Release Folder as Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: release-package
      #     # This saves everything: the images, the generated index.html files, and style.css
      #     path: |
      #       releases/
      #       style.css
      - name: Create GitHub pre-release
        id: create_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generate a unique tag based on date and short SHA
          TAG_NAME="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "Generated Tag: $TAG_NAME"
          
          # Set it as an output for the next step to use
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          
          gh release create "$TAG_NAME" \
            --title "Pre-release $TAG_NAME" \
            --notes "Automated pre-release build from main branch." \
            --prerelease

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read the tag from the previous step's output
          NEW_TAG="${{ steps.create_tag.outputs.tag }}"
          PROFILES="kform-shield-v1r3 kform-shield-v1r5"
          DDR_VARIANTS="d2d4 d1d8"
          IMGTYPES="kernel.img rootfs.img sysupgrade.bin"

          for profile in $PROFILES; do
            profile_dir="artifacts/images/latest/${profile}"
            zip_files=() # Array to dynamically collect verified files

            echo "--- Validating artifacts for $profile ---"
            
            # Validate bootloader variants
            for ddr in $DDR_VARIANTS; do
              artifact="${profile_dir}/${profile}-${ddr}-bootloader.img"
              [ -f "$artifact" ] || { echo "ERROR: missing: $artifact"; exit 1; }
              # [ -s "$artifact" ] || { echo "ERROR: empty: $artifact"; exit 1; }
              echo "[OK] ${profile}-${ddr}-bootloader.img ($(du -h "$artifact" | cut -f1))"
              zip_files+=("$artifact")
            done
            
            # Validate generic image types
            for imgtype in $IMGTYPES; do
              artifact="${profile_dir}/${profile}-${imgtype}"
              [ -f "$artifact" ] || { echo "ERROR: missing: $artifact"; exit 1; }
              # [ -s "$artifact" ] || { echo "ERROR: empty: $artifact"; exit 1; }
              echo "[OK] ${profile}-${imgtype} ($(du -h "$artifact" | cut -f1))"
              zip_files+=("$artifact")
            done

            zip_name="${profile}-images.zip"
            echo "Packaging ${zip_name}..."
            
            # Pass the dynamically generated array to zip
            # Note: -j junk paths, so filenames remain clean inside the zip
            zip -j "${zip_name}" "${zip_files[@]}"

            echo "Uploading ${zip_name} to release ${NEW_TAG}..."
            gh release upload "$NEW_TAG" "${zip_name}" --clobber
          done

          echo "All artifacts uploaded successfully"
