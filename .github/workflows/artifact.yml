name: Artifact Releases

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    strategy:
      matrix:
        config: ["arm64", "armv7", "x86_64"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile Hello World
        run: gcc -o hello_executable_${{ matrix.config }} main.c

      - name: Run Post-Build Scripts
        run: |
          chmod +x ./post.sh
          ./post.sh ${{ matrix.config }}

      - name: Save Build Config File
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ matrix.config }}
          path: build_config.txt

      - name: Create GitHub pre-release
        if: matrix.config == 'arm64'
        id: create_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "Generated Tag: $TAG_NAME"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          
          gh release create "$TAG_NAME" \
            --title "Pre-release $TAG_NAME" \
            --notes "Automated pre-release build with matrix: ${{ matrix.config }}" \
            --prerelease

      - name: Upload artifacts to release
        if: matrix.config == 'arm64'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.create_tag.outputs.tag }}"
          
          # Upload all config artifacts
          for config in arm64 armv7 x86_64; do
            if [ -f "config-${config}/build_config.txt" ]; then
              zip_name="${config}-build.zip"
              zip -j "${zip_name}" "config-${config}/build_config.txt"
              echo "Uploading ${zip_name} to release ${NEW_TAG}..."
              gh release upload "$NEW_TAG" "${zip_name}" --clobber
            fi
          done
          
          echo "All matrix artifacts uploaded successfully"